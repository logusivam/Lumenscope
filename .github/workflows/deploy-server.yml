name: Deploy Server to Render

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_URL secret is not set. Please set it in repository secrets."
            exit 1
          fi
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
